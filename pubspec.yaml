name: smart_attendance
description: Aplikasi Absensi Mahasiswa Berbasis Flutter dengan Pencatatan Waktu Kehadiran Secara Real-Time
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.4

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^17.3.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

  # Location / GPS
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Export
  pdf: ^3.11.2
  printing: ^5.14.1
  excel: ^4.0.6

  # Charts
  fl_chart: ^1.2.0

  # UI & Utils
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  permission_handler: ^12.0.3
  path_provider: ^2.1.5
  share_plus: ^13.1.0
  shimmer: ^3.0.0
  lottie: ^3.1.3
  intl: ^0.20.2
  uuid: ^4.5.1
  another_flushbar: ^2.2.4
  flutter_animate: ^4.5.2
  dotted_border: ^3.1.0
  percent_indicator: ^4.2.3
  table_calendar: ^3.1.3
  cupertino_icons: ^1.0.8
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
